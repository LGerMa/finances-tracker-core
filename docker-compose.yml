services:
  finances-tracker-core:
    build:
      context: .
      dockerfile: Dockerfile.develop
    container_name: "finances-tracker-core"
    env_file:
      - ./.envs/.env.example
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - 5005:5005
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgis/postgis:14-3.2-alpine
    env_file:
      - ./.envs/.db
    ports:
      - "25432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/postgresql/data
volumes:
  db-data:
